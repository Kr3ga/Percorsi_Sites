  <style>
    /* --- Gallery section (CSS Grid) --- */
    .gallery {
      max-width: 1200px;
      margin: 40px auto;
      padding: 16px;
      background: #fff; 
      color: #000;
      box-sizing: border-box;
      
      /* Trasformiamo il contenitore in una griglia fluida */
      display: grid;
      /* auto-fit adatta il numero di colonne. minmax stabilisce che i box non saranno mai più stretti di 220px, ma possono espandersi (1fr) */
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .photo-box {
      background: #efefef;
      border-radius: 8px;
      overflow: hidden;
      height: 160px; /* Altezza fissa per uniformità */
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: transform 0.18s cubic-bezier(.4,0,.2,1), box-shadow 0.18s;
      width: 100%;
      box-sizing: border-box;
    }

    /* effetto 'gonfia + ombra' on hover */
    .photo-box:hover {
      transform: scale(1.06);
      box-shadow: 0 10px 30px rgba(86,0,20,0.25), 0 2px 8px rgba(0,0,0,0.12);
      z-index: 2;
    }

    .photo-box a {
      display: block;
      width: 100%;
      height: 100%;
    }

    .photo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* Mantiene le proporzioni del logo senza tagliarlo */
      display: block;
      background: #fff;
      padding: 10px; /* Aggiunge un po' di respiro ai loghi */
      box-sizing: border-box;
    }
  </style>
</head>

  <!-- Script per Mobile Menu e Fade-in -->
  <script>
    const menuBtn = document.getElementById('mobile-menu-btn');
    const navLinks = document.getElementById('nav-links');

    menuBtn.addEventListener('click', () => {
      navLinks.classList.toggle('active');
      if (navLinks.classList.contains('active')) {
        menuBtn.textContent = '✕';
      } else {
        menuBtn.textContent = '☰';
      }
    });

    const faders = document.querySelectorAll('.fade-in');
    const appearOptions = { threshold: 0.1 };

    const appearOnScroll = new IntersectionObserver(function(entries, observer) {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      });
    }, appearOptions);

    faders.forEach(fader => {
      appearOnScroll.observe(fader);
    });
  </script>
