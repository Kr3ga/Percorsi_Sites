<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVENTI - PERCORSI</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Effetto Fade-in allo scroll */
    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease-out;
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Pulsante centrale Eventi Passati */
    .bottone-centrale {
      display: flex;
      justify-content: center;
      margin: 40px 0 20px 0;
    }
    .bottone-centrale button {
      background-color: #983128;
      color: white;
      border: none;
      padding: 18px 36px;
      font-size: 26px;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.2s cubic-bezier(.4,0,.2,1), box-shadow 0.25s cubic-bezier(.4,0,.2,1);
    }
    .bottone-centrale button:hover {
      background-color: #751f1a;
      transform: scale(1.08);
      box-shadow: 0 8px 24px rgba(86,0,20,0.25), 0 1.5px 8px rgba(0,0,0,0.13);
    }

    /* Sezione Locandina principale */
    .locandina-section {
      background: #ffffff;
      color: #222;
      padding: 40px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .locandina-wrapper {
      max-width: 900px;
      width: 100%;
      text-align: center;
    }
    .locandina-wrapper h3 {
      margin: 0 0 24px 0;
      font-size: 36px;
      font-weight: bold;
      color: #983128;
    }
    .locandina-figure {
      display: inline-block;
      margin: 0 0 16px 0;
    }
    .locandina-figure img {
      display: block;
      max-width: 420px;
      width: 100%;
      height: auto;
      cursor: pointer;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .locandina-figure img:focus,
    .locandina-figure img:hover {
      transform: translateY(-4px) scale(1.02);
      outline: 3px solid rgba(152,49,40,0.12);
    }
    .locandina-caption {
      font-size: 15px;
      color: #555;
      margin-top: 10px;
      font-weight: bold;
    }
    .locandina-details {
      margin-top: 20px;
      text-align: left;
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      font-size: 18px;
      line-height: 1.5;
      color: #222;
    }

    /* Lightbox overlay per zoom immagine */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 24px;
    }
    .lightbox.visible { display: flex; }
    .lightbox img {
      max-width: 96%;
      max-height: 92%;
      border-radius: 6px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }
    .lightbox-close {
      position: absolute;
      top: 18px;
      right: 18px;
      background: transparent;
      color: #fff;
      border: none;
      font-size: 40px;
      line-height: 1;
      cursor: pointer;
      padding: 6px 10px;
      opacity: 0.95;
    }
    .lightbox-close:focus { outline: 2px solid #fff; border-radius: 4px; }

    footer {
      background-color: #983128;
      color: #fff;
      text-align: center;
      padding: 30px 10px;
      font-size: 18px;
      margin-top: 60px;
    }
    footer a { color: #fff; text-decoration: underline; font-weight: bold; }

  </style>
</head>
<body>

  <nav>
    <div class="nav-container">
      <button class="menu-toggle" id="mobile-menu-btn" aria-label="Apri menu">☰</button>
      <ul id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="chi_siamo.html">Chi Siamo</a></li>
        <li><a href="cosa_facciamo.html">Cosa Facciamo</a></li>
        <li><a href="eventi.html">Eventi</a></li>
        <li><a href="partner.html">Partner</a></li>
        <li><a href="contatti.html">Contatti</a></li>
      </ul>
    </div>
  </nav>

  <div class="banner-container">
    <img src="immagini/Banner_sito_Percorsi.png" alt="Banner PerCorsi" class="banner" />        
    <div class="text-container">
      <h2>Eventi</h2>
      <p>
        Scopri qui tutti gli eventi organizzati da PerCorsi.<br />
        <b>Guarda gli Eventi Passati!</b>
      </p>
          <a href="#contenuto" class="scroll-button">Scopri di più</a>
    </div>
  </div>

  <div class="bottone-centrale">
    <button onclick="window.location.href='eventi_passati.html'">
      Eventi Passati
    </button>
  </div>

  <div id="contenuto"></div>

  <section class="locandina-section" aria-labelledby="locandina-title">
    <div class="locandina-wrapper">
      <h3 id="locandina-title">Sul Filo della Storia</h3>

      <figure class="locandina-figure">
        <img id="locandinaThumb" src="immagini/Locandina_10dicembre.png" alt="Locandina 10 dicembre" class="fade-in" tabindex="0" />
        <figcaption class="locandina-caption">Clicca per ingrandire</figcaption>
      </figure>

      </div>
    </div>
  </section>

  <div id="lightbox" class="lightbox" role="dialog" aria-hidden="true" aria-label="Immagine locandina ingrandita">
    <button class="lightbox-close" aria-label="Chiudi finestra">&times;</button>
    <img id="lightboxImg" src="" alt="Locandina ingrandita">
  </div>

  <footer>
    © 2025 PerCorsi – Tutti i diritti riservati.<br>
    <a href="contatti.html">Contattaci</a>
  </footer>

  <script>
    // 1. GESTIONE MENU MOBILE (HAMBURGER)
    const menuBtn = document.getElementById('mobile-menu-btn');
    const navLinks = document.getElementById('nav-links');

    menuBtn.addEventListener('click', () => {
      navLinks.classList.toggle('active');
      if (navLinks.classList.contains('active')) {
        menuBtn.textContent = '✕';
      } else {
        menuBtn.textContent = '☰';
      }
    });

    // 2. EFFETTO FADE-IN ALLO SCROLL
    const faders = document.querySelectorAll('.fade-in');
    const appearOptions = { threshold: 0.1 };
    
    const appearOnScroll = new IntersectionObserver(function(entries, observer) {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      });
    }, appearOptions);

    faders.forEach(fader => {
      appearOnScroll.observe(fader);
    });

    // 3. LOGICA LIGHTBOX (ZOOM LOCANDINA)
    (function() {
      const thumb = document.getElementById('locandinaThumb');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const closeBtn = document.querySelector('.lightbox-close');

      if (!thumb || !lightbox || !lightboxImg) return;

      function openLightbox() {
        lightboxImg.src = thumb.src;
        lightboxImg.alt = thumb.alt;
        lightbox.classList.add('visible');
        lightbox.setAttribute('aria-hidden', 'false');
        closeBtn.focus();
        document.addEventListener('keydown', onKeyDown);
      }

      function closeLightbox() {
        lightbox.classList.remove('visible');
        lightbox.setAttribute('aria-hidden', 'true');
        lightboxImg.src = '';
        thumb.focus();
        document.removeEventListener('keydown', onKeyDown);
      }

      function onKeyDown(e) {
        if (e.key === 'Escape') closeLightbox();
        if ((e.key === 'Enter' || e.key === ' ') && document.activeElement === closeBtn) {
          e.preventDefault();
          closeLightbox();
        }
      }

      thumb.addEventListener('click', openLightbox);
      thumb.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') openLightbox();
      });

      closeBtn.addEventListener('click', closeLightbox);

      lightbox.addEventListener('click', function(e) {
        if (e.target === lightbox) closeLightbox();
      });

      lightboxImg.addEventListener('click', function(e) {
        e.stopPropagation();
      });
    })();
  </script>
</body>
</html>
